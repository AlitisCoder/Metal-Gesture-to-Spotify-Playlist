<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Orge! 🎂</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .layer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Intro ── */
    #intro {
      background: #0a0a0a;
      gap: 1.5rem;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #intro.fade-out { opacity: 0; pointer-events: none; }

    .intro-img {
      max-height: 52vh;
      max-width: 85vw;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 50px rgba(255, 80, 130, 0.4);
    }

    .intro-msg {
      font-size: clamp(0.95rem, 2.5vw, 1.3rem);
      text-align: center;
      color: #ffcc00;
      max-width: 680px;
      padding: 0 1.5rem;
      line-height: 1.6;
      text-shadow: 0 0 14px rgba(255, 200, 0, 0.45);
    }

    .btn {
      font-size: 1.3rem;
      padding: 0.75rem 2.5rem;
      background: linear-gradient(135deg, #ff3366, #cc22ff);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 24px rgba(255, 50, 100, 0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover  { transform: scale(1.06); box-shadow: 0 6px 32px rgba(255, 50, 100, 0.65); }
    .btn:active { transform: scale(0.98); }

    /* ── Loading ── */
    #loading {
      background: #0a0a0a;
      gap: 1rem;
      z-index: 90;
      display: none;
    }

    #loading.visible { display: flex; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #ff3366;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #666; font-size: 0.9rem; }

    /* ── App ── */
    #app { display: none; z-index: 10; }
    #app.visible { display: block; }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      transform: scaleX(-1);
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 2.5rem 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .hud-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .hud-label {
      font-size: clamp(0.72rem, 1.5vw, 0.92rem);
      width: 320px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metal { color: #55ff88; }
    .heart { color: #cc66ff; }
    .cool  { color: #88ccff; }

    .progress-track {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: width 0.07s linear, background 0.2s;
    }

    .fill-metal { background: linear-gradient(90deg, #00bb44, #55ff88); }
    .fill-heart { background: linear-gradient(90deg, #7711bb, #cc66ff); }
    .fill-cool  { background: rgba(136, 204, 255, 0.4); }

    /* ── Image popup ── */
    #popup {
      background: rgba(0,0,0,0.92);
      z-index: 200;
      display: none;
    }

    #popup.visible { display: flex; }

    #popupText {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    #popupImg {
      max-height: 82vh;
      max-width: 88vw;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(255,255,255,0.15);
      animation: popIn 0.25s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.75); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    /* ── Spotify overlay ── */
    #spotifyOverlay {
      background: rgba(0,0,0,0.88);
      z-index: 210;
      display: none;
    }
    #spotifyOverlay.visible { display: flex; }

    .spotify-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: popIn 0.3s ease;
    }

    .spotify-title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .spotify-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: #1DB954;
      color: #000;
      font-size: 1.4rem;
      font-weight: 700;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 24px rgba(29, 185, 84, 0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .spotify-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 32px rgba(29, 185, 84, 0.75);
    }

    .spotify-hint {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Error ── */
    #error { background: #0a0a0a; gap: 1rem; z-index: 300; display: none; }
    #error.visible { display: flex; }
    #error p { color: #ff6666; text-align: center; max-width: 420px; line-height: 1.6; padding: 0 1rem; }
  </style>
</head>
<body>

  <!-- Intro -->
  <div id="intro" class="layer">
    <img src="herz.jpg" alt="Happy Birthday!" class="intro-img" />
    <p class="intro-msg">
      Happy Birthday Twinchacho! Mach die gleiche Geste wie die zwei geilen Typen hier! 🤘
    </p>
    <button class="btn" id="startBtn">Los geht's! 🎂</button>
  </div>

  <!-- Loading -->
  <div id="loading" class="layer">
    <div class="spinner"></div>
    <p class="loading-text">Lade Hand-Erkennung...</p>
  </div>

  <!-- Error -->
  <div id="error" class="layer">
    <p id="errorMsg">Ein Fehler ist aufgetreten.</p>
    <button class="btn" onclick="location.reload()">Neu laden 🔄</button>
  </div>

  <!-- App -->
  <div id="app">
    <video id="video" playsinline autoplay muted style="display:none"></video>
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-row">
        <span class="hud-label metal" id="metalLabel">🤘 Mach die Metal-Geste!</span>
        <div class="progress-track">
          <div class="progress-fill fill-metal" id="metalBar"></div>
        </div>
      </div>
      <div class="hud-row">
        <span class="hud-label heart" id="heartLabel">🤍 Forme ein Herz mit beiden Händen!</span>
        <div class="progress-track">
          <div class="progress-fill fill-heart" id="heartBar"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Popup -->
  <div id="popup" class="layer">
    <p id="popupText"></p>
    <img id="popupImg" src="" alt="Surprise!" />
  </div>

  <!-- Spotify overlay -->
  <div id="spotifyOverlay" class="layer">
    <div class="spotify-box">
      <p class="spotify-title">Fuck Yeah</p>
      <a id="spotifyBtn" href="" target="_blank" rel="noopener" class="spotify-btn">
        ▶ Spotify öffnen
      </a>
      <p class="spotify-hint">Klick drauf!</p>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs" } }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
